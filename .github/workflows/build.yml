name: Build

# pull_request only: a push trigger would build every PR branch twice
# (once as refs/heads/*, once as refs/pull/*/merge) with nothing cancelling.
# Tradeoff: branches without an open PR get no CI until workflow_dispatch.
on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so enableGitInfo populates accurate Lastmod

      - name: Install Hugo # same install as deploy.yml so PR checks use the same Hugo
        uses: peaceiris/actions-hugo@v3 # unpinned: tracks latest like Homebrew
        with:
          extended: true

      - name: Build with Hugo
        run: hugo --gc --minify --panicOnWarning
