name: deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: "25 8 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages

jobs:
  build:
    if: github.repository == 'philoserf/site'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so enableGitInfo populates accurate Lastmod
      - uses: actions/configure-pages@v6
        id: pages
      - uses: peaceiris/actions-hugo@v3 # unpinned: tracks latest like Homebrew
        with:
          extended: true
      - run: hugo --gc --minify --panicOnWarning
        env:
          HUGO_ENV: production
      - uses: lycheeverse/lychee-action@v2 # non-blocking while gauging noise (#719)
        continue-on-error: true
        with:
          args: --root-dir "${{ github.workspace }}/public" --include-fragments --no-progress 'public/**/*.html'
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
