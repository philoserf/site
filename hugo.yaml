baseURL: https://philoserf.com/
locale: en-us
title: Mark Ayers
enableGitInfo: true
enableRobotsTXT: true
taxonomies: {} # intentionally empty to disable tags and categories
params:
  author: "Mark Ayers"
  since: 2005
  description: "Short, plain, unhedged essays on thinking and cognition, civilization, identity, and AI — with poetry, story, and the small crafts of attention: coffee, calendars, kitchens, and code."
  email: "mark@philoserf.com"
  motto: "COGITA·DISCE·NECTE·ENUNTIA"
  nickname: "philoserf"
  home:
    headline: "Uncompressed public thinking"
    featured:
      pageRef: /posts/agency-without-a-self
    startHere:
      - pageRef: /posts/two-epistemic-cycles
      - pageRef: /posts/uncompressed-public-thinking
      - pageRef: /posts/old-man-by-the-river
      - pageRef: /posts/republic-continuity-as-achievement
  contact:
    givenName: "Mark"
    familyName: "Ayers"
    birthday: "19620704"
    phone: "+12062804061"
    timezone: "America/Detroit"
    address:
      street: "160 Rollingwood Dr"
      city: "Rockford"
      region: "MI"
      postalCode: "49341"
      country: "United States"
  social:
    github: "https://github.com/philoserf"
    mastodon: "https://pkm.social/@philoserf"

menus:
  main:
    - identifier: about
      name: About
      pageRef: /about
      weight: 10
      params:
        description: Who the author is
    - identifier: now
      name: Now
      pageRef: /now
      weight: 20
      params:
        description: Current focus
    - identifier: uses
      name: Uses
      pageRef: /uses
      weight: 30
      params:
        description: Tools and setup
    - identifier: posts
      name: Posts
      pageRef: /posts
      weight: 40
      params:
        description: Index of all posts
        llmsSection: writing

mediaTypes:
  application/manifest+json:
    suffixes: [webmanifest]
  text/vcard:
    suffixes: [vcf]

outputFormats:
  llms:
    name: llms
    mediaType: text/plain
    baseName: llms
    isPlainText: true
    notAlternative: true
  manifest:
    name: manifest
    mediaType: application/manifest+json
    baseName: site
    isPlainText: true
    notAlternative: true
  vcard:
    name: vcard
    mediaType: text/vcard
    baseName: vcard
    isPlainText: true
    notAlternative: true

outputs:
  home:
    - html
    - rss
    - llms
    - manifest
    - vcard
