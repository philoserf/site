baseURL: https://philoserf.com/
locale: en-us
title: Mark Ayers
enableGitInfo: true
enableRobotsTXT: true
taxonomies: {} # intentionally empty to disable tags and categories

params:
  author: "Mark Ayers"
  since: 2005
  description: "Short, plain, unhedged essays on thinking and cognition, civilization, and identity — with poetry, story, and the small crafts of attention: coffee, calendars, kitchens, and code."
  email: "mark@philoserf.com"
  # Three-line Latin motto; the second line is the primary motto (vCard NOTE)
  motto:
    - "HOMO·HOMINIS·ESSE"
    - "COGITA·DISCE·NECTE·ENUNTIA"
    - "PERCIPE·STRUE·EFFICE"
  nickname: "philoserf"
  # Warm-paper background hexes; must match --background-color in static/style.css
  themeColor:
    light: "#faf7f1"
    dark: "#201d18"

  home:
    headline: "Uncompressed public thinking"
    startHereIntro: "Essays that say what the rest is trying to do."
    featured:
      - pageRef: /posts/agency-without-a-self
      - pageRef: /posts/elasticity-of-moral-circles
    startHere:
      - pageRef: /posts/two-epistemic-cycles
      - pageRef: /posts/uncompressed-public-thinking
      - pageRef: /posts/old-man-by-the-river
      - pageRef: /posts/republic-continuity-as-achievement

  contact:
    givenName: "Mark"
    familyName: "Ayers"
    birthday: "19620704"
    phone: "+12062804061"
    timezone: "America/Detroit"
    address:
      street: "160 Rollingwood Dr"
      city: "Rockford"
      region: "MI"
      postalCode: "49341"
      country: "United States"

  social:
    github: "https://github.com/philoserf"
    mastodon: "https://pkm.social/@philoserf"

menus:
  main:
    - name: About
      pageRef: /about
      weight: 10
      params:
        description: Who the author is
    - name: Now
      pageRef: /now
      weight: 20
      params:
        description: Current focus
    - name: Uses
      pageRef: /uses
      weight: 30
      params:
        description: Tools and setup
    - name: Posts
      pageRef: /posts
      weight: 40
      params:
        description: Index of all posts

mediaTypes:
  application/manifest+json:
    suffixes: [webmanifest]
  text/vcard:
    suffixes: [vcf]

outputFormats:
  llms:
    name: llms
    mediaType: text/plain
    baseName: llms
    isPlainText: true
    notAlternative: true
  manifest:
    name: manifest
    mediaType: application/manifest+json
    baseName: site
    isPlainText: true
    notAlternative: true
  vcard:
    name: vcard
    mediaType: text/vcard
    baseName: vcard
    isPlainText: true
    notAlternative: true

outputs:
  home:
    - html
    - rss
    - llms
    - manifest
    - vcard
